name: PR Test Pipeline

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      
      - name: Install dependencies
        run: dart pub get
        
      # The Fatal Flaw: Passing secrets into an untrusted test environment
      - name: Run Tests
        env:
          API_KEY: ${{ secrets.LEGACY_API_KEY }}
        run: dart test
